# Training hyperparameters for tranquillyzer models
# Each top-level key is a model name.
# Values can be single values or lists (for grid search: all combinations are tried).

template_model:
  batch_size: 128
  train_fraction: 0.8
  vocab_size: 5
  embedding_dim: 128
  conv_layers: 4
  conv_filters: [128, 128, 128, 128]
  conv_kernel_sizes: [25, 25, 25, 25]
  dilation_rates: [1, 1, 1, 1]
  lstm_layers: 1
  lstm_units: [96]
  bidirectional: true
  crf_layer: true
  attention_heads: 0
  dropout_rate: 0.35
  regularization: 0.01
  learning_rate: 0.001
  epochs: 5

