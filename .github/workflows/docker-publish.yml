name: Build and Push Docker Image

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    if: github.repository == 'huishenlab/tranquillyzer'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=tranquillyzer_v${VERSION}_tf2.15.0" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tranquillyzer:${{ steps.meta.outputs.image_tag }}
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
